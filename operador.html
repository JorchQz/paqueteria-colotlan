  <!-- ── Header ─────────────────────────────────────── -->
  <header class="app-header">

    <span class="app-header__title">Panel Mostrador</span>

  <!-- ── Corte del día ──────────────────────────────── -->
  <section style="padding:16px">
    <h2 style="font-size:1rem;margin-bottom:12px">Corte del día</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div class="corte-stat">
        <div class="corte-stat__valor" id="stat-envios">0</div>
        <div class="corte-stat__label">Envíos hoy</div>

        <div class="corte-stat__label">Total cobrado</div>
      </div>
    </div>

    <!-- Acciones rápidas -->
    <h2 style="font-size:1rem;margin-bottom:12px">Acciones</h2>
    <div class="operator-grid" style="padding:0">
      <div class="operator-tile" id="tile-nuevo-envio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>

      </div>
      <div class="operator-tile" id="tile-rastrear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span>Rastrear guía</span>
      </div>
      <div class="operator-tile" id="tile-imprimir">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        <span>Imprimir ticket</span>
      </div>
      <div class="operator-tile" id="tile-corte">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>Corte PDF</span>
      </div>
    </div>
  </section>

  <!-- ── Lista envíos del día ───────────────────────── -->

    <h2 style="font-size:1rem;margin-bottom:12px">Envíos de hoy</h2>

  <div id="toast" class="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module">
